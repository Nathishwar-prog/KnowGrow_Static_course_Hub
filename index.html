<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnowGrow HTML Tutorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <style>
      .h-screen-minus-nav {
        height: calc(100vh - 112px);
      }
      @keyframes pulse-green {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(22, 163, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
        }
      }
      .animate-pulse-green {
        animation: pulse-green 2s infinite;
      }
      
      @keyframes blink-caret {
        from, to { opacity: 1; }
        50% { opacity: 0; }
      }
      .typing-cursor {
        display: inline-block;
        width: 1px;
        height: 1.2em; /* match line height */
        background-color: #fb923c; /* orange-400 */
        animation: blink-caret 0.75s step-end infinite;
        vertical-align: bottom;
        margin-left: 1px;
      }

      /* Quiz styles */
      .quiz-option {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        border: 2px solid;
        font-size: 1rem;
        text-align: left;
        transition: all 0.2s ease-in-out;
        cursor: pointer;
      }
      .quiz-option.selected {
        border-color: #6366f1; /* indigo-500 */
        background-color: #eef2ff; /* indigo-50 */
        color: #1f2937;
      }
      .dark .quiz-option.selected {
        background-color: rgba(99, 102, 241, 0.2); /* indigo-500/20 */
        color: #f3f4f6;
      }
      .quiz-option:not(.selected):not(.disabled):hover {
         border-color: #a5b4fc; /* indigo-300 */
         background-color: #f9fafb; /* gray-50 */
      }
      .dark .quiz-option:not(.selected):not(.disabled):hover {
          background-color: rgba(255, 255, 255, 0.05);
      }

      .quiz-option {
        border-color: #e5e7eb; /* gray-200 */
        background-color: #ffffff; /* white */
        color: #374151; /* gray-700 */
      }
      .dark .quiz-option {
        border-color: #4b5563; /* gray-600 */
        background-color: #374151; /* gray-700 */
        color: #d1d5db; /* gray-300 */
      }
      
      .quiz-option .quiz-option-letter {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.75rem;
        height: 1.75rem;
        margin-right: 0.75rem;
        border-radius: 9999px;
        font-weight: bold;
        transition: all 0.2s ease-in-out;
      }
      .quiz-option:not(.selected) .quiz-option-letter {
        background-color: #f3f4f6; /* gray-100 */
        color: #4b5563; /* gray-600 */
      }
      .dark .quiz-option:not(.selected) .quiz-option-letter {
        background-color: #4b5563; /* gray-600 */
        color: #e5e7eb; /* gray-200 */
      }
      .quiz-option.selected .quiz-option-letter {
        background-color: #6366f1; /* indigo-500 */
        color: white;
      }

      .quiz-option.correct {
        border-color: #16a34a; /* green-600 */
        background-color: #f0fdf4; /* green-50 */
        color: #15803d; /* green-700 */
        font-weight: bold;
        cursor: not-allowed;
      }
      .dark .quiz-option.correct {
        background-color: rgba(22, 163, 74, 0.2);
        color: #bbf7d0; /* green-200 */
      }
      
      .quiz-option.incorrect {
        border-color: #dc2626; /* red-600 */
        background-color: #fef2f2; /* red-50 */
        color: #b91c1c; /* red-700 */
        cursor: not-allowed;
      }
      .dark .quiz-option.incorrect {
        background-color: rgba(220, 38, 38, 0.2);
        color: #fecaca; /* red-200 */
      }

      .quiz-option.disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      
      .quiz-option .quiz-option-icon {
        margin-left: auto;
        font-size: 1.25rem;
      }
      .quiz-option.correct .quiz-option-icon { color: #16a34a; }
      .quiz-option.incorrect .quiz-option-icon { color: #dc2626; }
      
      /* Modal styles */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background-color: rgba(17, 24, 39, 0.6); /* bg-gray-900/60 */
        backdrop-filter: blur(4px);
        transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0;
        z-index: 45; /* Below modal content */
      }
      .modal-backdrop-open {
        opacity: 1;
      }
      .modal-content {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.95);
        background-color: white;
        border-radius: 0.75rem; /* rounded-xl */
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        width: 90%;
        max-width: 64rem; /* max-w-6xl for side-by-side view */
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        opacity: 0;
        transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1), transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 50;
      }
      .dark .modal-content {
        background-color: #1f2937; /* dark:bg-gray-800 */
      }
      .modal-content-open {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      
      /* New Loading Animation Styles */
      @keyframes fade-in-up-letter {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in-up-letter {
        animation: fade-in-up-letter 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        opacity: 0; /* Start hidden */
      }
      
      .loading-dots span {
        animation: pulse-dots 1.4s infinite ease-in-out both;
        display: inline-block;
      }

      @keyframes pulse-dots {
        0%, 80%, 100% {
          opacity: 0;
        }
        40% {
          opacity: 1;
        }
      }

      /* Highlight style for search */
      mark {
        background-color: #fef08a; /* yellow-200 */
        color: #713f12; /* amber-900 */
        padding: 2px 4px;
        border-radius: 3px;
      }
      .dark mark {
        background-color: #facc15; /* yellow-400 */
        color: #422006; /* amber-950 */
      }

      /* Intro Animation Styles */
      @keyframes intro-shadow-pulse {
        0% {
          text-shadow: 0 0 50px rgba(129, 140, 248, 0);
          opacity: 0;
          transform: scale(1.2);
        }
        30% {
          text-shadow: 0 0 30px rgba(129, 140, 248, 0.8);
          opacity: 1;
          transform: scale(1);
        }
        70% {
          text-shadow: 0 0 30px rgba(129, 140, 248, 0.8);
          opacity: 1;
          transform: scale(1);
        }
        100% {
          text-shadow: 0 0 50px rgba(129, 140, 248, 0);
          opacity: 0;
          transform: scale(1.2);
        }
      }
      .intro-shadow {
        animation: intro-shadow-pulse 3.5s ease-in-out;
      }

      @keyframes intro-text-pop {
          from {
              transform: translateY(20px);
              opacity: 0;
          }
          to {
              transform: translateY(0);
              opacity: 1;
          }
      }
      .intro-text-container span {
          display: inline-block;
          opacity: 0;
          animation: intro-text-pop 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      
      /* Scrollbar Hiding Utility */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Prism JS Themes -->
    <link id="prism-light-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-ghcolors.min.css" />
    <link id="prism-dark-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-vsc-dark-plus.min.css" disabled />
    <!-- Fuzzy Search Library -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script type="module" src="/index.tsx"></script>

  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/"
  }
}
</script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-200">
    <div id="root"></div>
    <!-- Prism JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  </body>
</html>

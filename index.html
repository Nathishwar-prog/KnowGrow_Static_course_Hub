<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnowGrow HTML Tutorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <style>
      .h-screen-minus-nav {
        height: calc(100vh - 112px);
      }
      @keyframes pulse-green {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(22, 163, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
        }
      }
      .animate-pulse-green {
        animation: pulse-green 2s infinite;
      }
      
      @keyframes blink-caret {
        from, to { opacity: 1; }
        50% { opacity: 0; }
      }
      .typing-cursor {
        display: inline-block;
        width: 1px;
        height: 1.2em; /* match line height */
        background-color: #fb923c; /* orange-400 */
        animation: blink-caret 0.75s step-end infinite;
        vertical-align: bottom;
        margin-left: 1px;
      }
      
      /* Modal styles */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background-color: rgba(17, 24, 39, 0.6); /* bg-gray-900/60 */
        backdrop-filter: blur(4px);
        transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0;
        z-index: 45; /* Below modal content */
      }
      .modal-backdrop-open {
        opacity: 1;
      }
      .modal-content {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.95);
        background-color: white;
        border-radius: 0.75rem; /* rounded-xl */
        box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        width: 90%;
        max-width: 64rem; /* max-w-6xl for side-by-side view */
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        opacity: 0;
        transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1), transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 50;
      }
      .dark .modal-content {
        background-color: #1f2937; /* dark:bg-gray-800 */
      }
      .modal-content-open {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      
      /* New Loading Animation Styles */
      @keyframes fade-in-up-letter {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in-up-letter {
        animation: fade-in-up-letter 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        opacity: 0; /* Start hidden */
      }
      
      .loading-dots span {
        animation: pulse-dots 1.4s infinite ease-in-out both;
        display: inline-block;
      }

      @keyframes pulse-dots {
        0%, 80%, 100% {
          opacity: 0;
        }
        40% {
          opacity: 1;
        }
      }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Prism JS Themes -->
    <link id="prism-light-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-ghcolors.min.css" />
    <link id="prism-dark-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-vsc-dark-plus.min.css" disabled />
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/"
  }
}
</script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-200">
    <div id="root"></div>
    <!-- Prism JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  </body>
</html>
